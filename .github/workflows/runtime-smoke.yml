name: Runtime Smoke

on:
  workflow_dispatch:
    inputs:
      headroom_spec:
        description: "headroom-ai package spec to test"
        required: false
        default: "headroom-ai[proxy]>=0.26,<0.28"
  schedule:
    # Weekly certification smoke. Keep push CI fast; use this for real proxy runtime drift.
    - cron: "17 9 * * 1"

jobs:
  runtime-smoke:
    name: runtime-smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Full upstream proxy + plugin runtime smoke
        run: python scripts/test-headroom-runtime-smoke.py --spec "${{ github.event.inputs.headroom_spec || 'headroom-ai[proxy]>=0.26,<0.28' }}" --install-timeout 600
