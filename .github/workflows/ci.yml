name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package dependencies
        run: python -m pip install -U pip PyYAML
      - name: Unit tests
        run: python -m unittest discover -s tests -v
        env:
          PYTHONPATH: src
      - name: Python syntax checks
        shell: bash
        run: python -m py_compile $(find src tests scripts -name '*.py' | sort)
      - name: Shell syntax checks
        if: runner.os != 'Windows'
        run: bash -n scripts/*.sh
      - name: Repo readiness audit
        if: runner.os != 'Windows'
        run: scripts/audit-repo-readiness.sh
      - name: Metrics generator smoke
        run: python scripts/generate-weekly-savings-table.py --write docs/metrics/weekly-savings.ci.md
      - name: Upstream Headroom dependency install smoke
        run: python scripts/test-headroom-dependency-install.py
      - name: Clean-home install smoke if Hermes CLI is available
        if: runner.os != 'Windows'
        run: |
          if command -v hermes >/dev/null 2>&1; then
            scripts/test-clean-hermes-install.sh --local
          else
            echo "Hermes CLI not available in CI runner; skipping clean-home Hermes install smoke."
          fi
